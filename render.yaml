services:
  - type: web
    name: ugc-saas-backend
    runtime: node
    rootDir: server
    buildCommand: npm install --include=dev && npm run build
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false
      - key: CLERK_PUBLISHABLE_KEY
        sync: false
      - key: CLERK_SECRET_KEY
        sync: false
      - key: CLERK_WEBHOOK_SIGNING_SECRET
        sync: false
      - key: CLOUDINARY_URL
        sync: false
      - key: GOOGLE_GENAI_API_KEY
        sync: false
      - key: FRONTEND_URL
        sync: false
